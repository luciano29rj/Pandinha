<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Questões - Panda Estudos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Fredoka One', 'Comic Sans MS', 'Chalkboard SE', cursive;
            background: linear-gradient(180deg, #E6F7FF 0%, #FFF0F5 50%, #FFFACD 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        
        /* Classe para ocultar elementos */
        .hidden {
            display: none !important;
        }
        
        /* Header igual à imagem */
        .header-simples {
            padding: 12px 16px;
            background: transparent;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        
        /* Caixa da questão - ESTILO EXATO DA IMAGEM */
        .question-counter {
            font-size: 20px;
            font-weight: bold;
            color: #FF4081;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 24px;
            border-radius: 25px;
            display: inline-block;
            box-shadow: 0 4px 12px rgba(255, 64, 129, 0.2);
            border: 3px solid #FFD1DC;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            letter-spacing: 0.5px;
        }
        
        /* Botões de navegação */
        .btn-voltar {
            background: white;
            padding: 8px;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border: 2px solid #FFD1DC;
            transition: all 0.2s ease;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .btn-trocar {
            background: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            color: #FF7043;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border: 2px solid #FFD1DC;
            transition: all 0.2s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            height: 44px;
            cursor: pointer;
        }
        
        /* Timer discreto */
        .timer-container {
            font-size: 20px;
            font-weight: bold;
            color: #FF4081;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 6px 12px;
            border-radius: 25px;
            display: inline-block;
            box-shadow: 0 4px 12px rgba(255, 64, 129, 0.2);
            border: 3px solid #FFD1DC;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            letter-spacing: 0.5px;
            min-width: 80px;
        }

        .timer-emoji {
            font-size: 18px;
            margin-right: 5px;
        }

        /* Ajuste do layout do header */
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
        }

        /* Container do timer para ficar alinhado */
        .timer-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        /* Lâmpada no feedback */
        #emojiFeedback {
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60px;
            margin: 10px 0;
        }

        #emojiFeedback:hover {
            transform: scale(1.1);
        }

        .fa-lightbulb {
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        /* Animações */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .animate-bounce {
            animation: bounce 0.5s ease infinite;
        }

        .animate-pulse {
            animation: pulse 0.5s ease infinite;
        }

        /* Caixa da questão - IDÊNTICO À IMAGEM */
        .question-box {
            background: white;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border: 4px solid #FFB6C1;
            margin-bottom: 20px;
            position: relative;
        }
        
        .question-text {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            text-align: center;
            line-height: 1.4;
            margin: 0;
            padding: 10px 0;
            font-family: 'Fredoka One', cursive;
            background: linear-gradient(135deg, #FF4081, #FF9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        
        /* Container de imagem - NOVO */
        .imagem-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }
        
        .imagem-questao {
            max-width: 100%;
            max-height: 250px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 3px solid #FFD1DC;
        }
        
        /* Opções como na imagem - com checkbox quadrado (2 COLUNAS) */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .option-item {
            background: #F8F9FF;
            border: 3px solid #BBDEFB;
            border-radius: 16px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            justify-content: center;
        }
        
        .option-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(149, 117, 205, 0.15);
            border-color: #90CAF9;
        }
        
        .option-item.selected {
            background: #FFF0F7;
            border-color: #FF4081;
            transform: scale(1.01);
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.15);
        }
        
        /* Opção já respondida */
        .option-item.respondida-correta {
            background: #E8F5E9;
            border-color: #4CAF50;
            pointer-events: none;
        }
        
        .option-item.respondida-incorreta {
            background: #FFEBEE;
            border-color: #F44336;
            pointer-events: none;
        }
        
        /* Checkbox quadrado igual à imagem */
        .option-checkbox {
            display: none;
        }
        
        .option-text {
            font-size: 18px;
            font-weight: 700;
            color: #444;
            font-family: 'Fredoka One', cursive;
            line-height: 1.3;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        
        /* Botão RESPONDER */
        .responder-btn {
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 18px 40px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            margin: 20px auto 10px;
            display: block;
            transition: all 0.2s ease;
            font-family: 'Fredoka One', cursive;
            box-shadow: 0 6px 15px rgba(76, 175, 80, 0.25);
            border: 4px solid #2E7D32;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 280px;
        }
        
        .responder-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }
        
        .responder-btn:disabled {
            background: linear-gradient(135deg, #B0BEC5, #CFD8DC);
            border-color: #78909C;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
        }
        
        /* Botões de navegação entre questões */
        .nav-buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        
        .nav-btn {
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid #FFB6C1;
            box-shadow: 0 4px 10px rgba(255, 182, 193, 0.3);
            transition: all 0.2s ease;
            color: #FF4081;
            font-size: 24px;
        }
        
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 182, 193, 0.4);
            background: #FFF0F7;
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 2px 5px rgba(255, 182, 193, 0.2);
        }
        
        /* Container principal */
        main { 
            flex: 1; 
            overflow-y: auto; 
            padding-bottom: 100px;
        }
        
        /* Emoji de feedback */
        .feedback-emoji-quiz {
            font-size: 60px;
            text-align: center;
            margin: 10px 0;
            animation: bounceEmoji 1s infinite alternate;
        }
        
        @keyframes bounceEmoji {
            from { transform: translateY(0px); }
            to { transform: translateY(-10px); }
        }
        
        /* ============================================
           ESTILOS ESPECÍFICOS PARA MODO LISTA (INFANTIL)
           ============================================ */

        /* Container principal da lista */
        .questoes-lista-container {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
        }

        /* Card de cada questão no modo lista - ESTILO COMPACTO */
        .questao-card-lista {
            background: linear-gradient(145deg, #FFFFFF, #FFFAF5);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(255, 182, 193, 0.25);
            border: 5px solid #FFB6C1;
            position: relative;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .questao-card-lista:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(255, 182, 193, 0.35);
        }

        /* Cabeçalho da questão COMPACTO */
        .questao-header-lista {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px dashed #FFD1DC;
        }

        /* Número da questão - grande e colorido */
        .numero-questao-lista {
            background: linear-gradient(135deg, #FF4081, #FF9800);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin-right: 15px;
            box-shadow: 0 4px 10px rgba(255, 64, 129, 0.3);
            border: 3px solid white;
        }

        /* Lâmpada de dica entre número e matéria */
        .lampada-dica-lista {
            margin-right: 12px;
            color: #FFC107;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .lampada-dica-lista:hover {
            transform: scale(1.2);
        }

        /* Tags de matéria/assunto - estilo infantil */
        .questao-tags {
            flex: 1;
        }

        .tag-materia {
            background: #E3F2FD;
            color: #1565C0;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            margin-right: 8px;
            border: 2px solid #BBDEFB;
        }

        .tag-assunto {
            background: #F3E5F5;
            color: #7B1FA2;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid #E1BEE7;
        }

        /* Enunciado da questão - mais compacto */
        .enunciado-lista {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            line-height: 1.4;
            margin-bottom: 20px;
            padding: 0 10px;
            font-family: 'Fredoka One', cursive;
            background: linear-gradient(135deg, #FF4081, #FF9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Contêiner das opções no modo lista - ESTILO COMPACTO */
        .opcoes-container-lista {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        /* Opção individual - ESTILO SIMILAR À IMAGEM */
        .opcao-item-lista {
            background: white;
            border: 3px solid #BBDEFB;
            border-radius: 20px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .opcao-item-lista:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(149, 117, 205, 0.15);
            border-color: #90CAF9;
        }

        .opcao-item-lista.selecionada {
            background: #FFF0F7;
            border-color: #FF4081;
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.15);
        }

        .opcao-item-lista.correta {
            background: #E8F5E9;
            border-color: #4CAF50;
            border-width: 4px;
        }

        .opcao-item-lista.incorreta {
            background: #FFEBEE;
            border-color: #F44336;
            border-width: 4px;
        }

        /* Letra da opção - círculo simples (sem tanto destaque) */
        .letra-opcao-lista {
            background: #FF4081;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            flex-shrink: 0;
            box-shadow: 0 3px 8px rgba(255, 64, 129, 0.3);
        }

        .opcao-item-lista.correta .letra-opcao-lista {
            background: #4CAF50;
        }

        .opcao-item-lista.incorreta .letra-opcao-lista {
            background: #F44336;
        }

        /* Texto da opção - mais compacto */
        .texto-opcao-lista {
            font-size: 18px;
            font-weight: 500;
            color: #444;
            line-height: 1.3;
            flex: 1;
        }

        /* Feedback quando errou - mais compacto */
        .feedback-erro {
            margin-top: 12px;
            padding: 12px;
            background: linear-gradient(to right, #FFF8E1, #FFECB3);
            border-radius: 20px;
            border: 3px solid #FFD54F;
            font-size: 16px;
        }

        /* Botão de responder individual (novo) */
        .btn-responder-lista {
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.25);
            margin-top: 10px;
            display: block;
            width: 100%;
            text-align: center;
            border: 4px solid #2E7D32;
        }

        .btn-responder-lista:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.35);
        }

        .btn-responder-lista:disabled {
            background: linear-gradient(135deg, #B0BEC5, #CFD8DC);
            border-color: #78909C;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
        }

        /* Status da questão - NOVAS CORES */
        .status-questao {
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 15px;
            margin-top: 10px;
            display: inline-block;
        }

        /* Status quando acertou - VERDE */
        .status-acertou {
            background: #E8F5E9;
            color: #2E7D32;
            font-weight: bold;
        }

        /* Status quando errou - VERMELHO */
        .status-errou {
            background: #FFEBEE;
            color: #C62828;
            font-weight: bold;
        }

        /* Status não respondida - LARANJA */
        .status-nao-respondida {
            background: #FFF3E0;
            color: #EF6C00;
            font-weight: bold;
        }

        /* Modal de dica */
        .modal-dica-lista .modal-dica-conteudo {
            max-width: 450px;
            padding: 20px;
        }

        .texto-dica-modal {
            font-size: 16px;
            line-height: 1.4;
            padding: 15px;
        }

        /* Mensagem quando não há questões */
        .sem-questoes {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(145deg, #E3F2FD, #BBDEFB);
            border-radius: 25px;
            border: 4px solid #64B5F6;
            margin: 20px 0;
        }

        .sem-questoes-emoji {
            font-size: 60px;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        /* ============================================
           HEADER FLUTUANTE PARA MODO LISTA
           ============================================ */
        
        /* Header fixo que aparece ao rolar */
        .header-flutuante {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        
        .header-flutuante.visivel {
            opacity: 0.9;
            transform: translateY(0);
            pointer-events: auto;
        }
        
        /* Botões menores no header flutuante */
        .btn-voltar-flutuante {
            background: rgba(255, 255, 255, 0.95);
            padding: 6px;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            border: 2px solid #FFD1DC;
            transition: all 0.2s ease;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        
        .btn-trocar-flutuante {
            background: rgba(255, 255, 255, 0.95);
            padding: 5px 10px;
            border-radius: 18px;
            font-weight: bold;
            color: #FF7043;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            border: 2px solid #FFD1DC;
            transition: all 0.2s ease;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            height: 36px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        
        /* Timer menor no header flutuante */
        .timer-flutuante {
            font-size: 16px;
            font-weight: bold;
            color: #FF4081;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 4px 8px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 2px 8px rgba(255, 64, 129, 0.2);
            border: 2px solid #FFD1DC;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            letter-spacing: 0.5px;
            min-width: 60px;
            backdrop-filter: blur(5px);
        }
        
        .timer-flutuante-emoji {
            font-size: 14px;
            margin-right: 3px;
        }
        
        /* Container para desktop - centralizado e menor */
        @media (min-width: 768px) {
            .container-desktop {
                max-width: 768px;
                margin: 0 auto;
                width: 100%;
            }
            
            .questoes-lista-container {
                max-width: 768px;
                margin: 0 auto;
            }
            
            /* Header flutuante maior no desktop */
            .header-flutuante {
                top: 15px;
                right: 15px;
                gap: 10px;
            }
            
            .btn-voltar-flutuante {
                width: 40px;
                height: 40px;
            }
            
            .btn-trocar-flutuante {
                padding: 6px 12px;
                font-size: 13px;
                height: 40px;
            }
            
            .timer-flutuante {
                font-size: 18px;
                min-width: 70px;
            }
        }

        /* Responsividade para CELULAR */
        @media (max-width: 767px) {
            /* CELULAR: Modo lista colado nas bordas */
            .questoes-lista-container {
                padding: 6px;
                margin-top: 6px;
            }
            
            .questao-card-lista {
                padding: 15px;
                margin-bottom: 15px;
                border-radius: 20px;
                border-width: 4px;
            }
            
            .enunciado-lista {
                font-size: 20px;
                padding: 0 5px;
            }
            
            .opcao-item-lista {
                padding: 14px 16px;
            }
            
            .letra-opcao-lista {
                width: 35px;
                height: 35px;
                font-size: 18px;
            }
            
            .texto-opcao-lista {
                font-size: 16px;
            }
            
            .numero-questao-lista {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            
            .lampada-dica-lista {
                font-size: 18px;
                margin-right: 10px;
            }
            
            .tag-materia, .tag-assunto {
                font-size: 12px;
                padding: 5px 10px;
            }
            
            .btn-responder-lista {
                padding: 10px 20px;
                font-size: 15px;
            }
            
            /* CELULAR: Modo quiz - duas colunas */
            .question-counter {
                font-size: 18px;
                padding: 8px 20px;
            }
            
            .question-text {
                font-size: 22px;
            }
            
            .option-text {
                font-size: 16px;
            }
            
            .option-item {
                padding: 12px 14px;
            }
            
            .options-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            
            .responder-btn {
                font-size: 20px;
                padding: 16px 35px;
                max-width: 260px;
            }
            
            .header-content {
                gap: 8px;
            }
            
            .btn-trocar {
                padding: 6px 12px;
                font-size: 13px;
            }
            
            .timer-container {
                font-size: 18px;

    <script>
    // Variáveis globais
    let filteredQuestions = [], currentIndex = 0, seconds = 0, timerInterval, modoAtual = 'quiz';
    let respostasSelecionadas = {}, opcaoSelecionada = null, respostaConfirmada = false;
    let timerRunning = true;
    let respostaSelecionadaLista = {};
    const BASE_URL = '';
    
    // Inicializa quando o DOM estiver carregado
    document.addEventListener('DOMContentLoaded', init);
    
    async function init() {
        const materia = localStorage.getItem('currentMateria') || "Ciências";
        const assunto = localStorage.getItem('currentAssunto') || "Anatomia Humana";
        
        console.log('DEBUG: Iniciando questões para:', materia, assunto);
        document.title = `${assunto} - ${materia} - Panda Estudos`;
        
        await carregarQuestoesDoBanco(materia, assunto);
        
        startTimer();
        
        mostrarQuestao();
        
        configurarHeaderFlutuante();
    }
    
    function configurarHeaderFlutuante() {
        window.addEventListener('scroll', function() {
            const headerFlutuante = document.getElementById('headerFlutuante');
            const modoLista = document.getElementById('modoLista');
            
            if (!modoLista || modoLista.classList.contains('hidden')) {
                if (headerFlutuante) {
                    headerFlutuante.classList.remove('visivel');
                }
                return;
            }
            
            if (window.scrollY > 100) {
                headerFlutuante.classList.add('visivel');
            } else {
                headerFlutuante.classList.remove('visivel');
            }
            
            updateTimerDisplayFlutuante();
        });
    }
    
    function updateTimerDisplayFlutuante() {
        const minutes = Math.floor(seconds / 60);
        const remainingSeconds = seconds % 60;
        const timerFlutuante = document.getElementById('timerFlutuante');
        if (timerFlutuante) {
            timerFlutuante.textContent = `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }
    }
    
    async function carregarQuestoesDoBanco(materia, assunto) {
        try {
            // ✅ Usar caminho relativo (sem BASE_URL)
            const apiUrl = `/api/questoes?materia=${encodeURIComponent(materia)}&assunto=${encodeURIComponent(assunto)}`;
            console.log('URL da API:', apiUrl);
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            
            const response = await fetch(apiUrl, { 
                signal: controller.signal 
            }).finally(() => clearTimeout(timeoutId));
            
            if (!response.ok) {
                throw new Error(`Erro HTTP: ${response.status}`);
            }
            
            const questoes = await response.json();
            console.log('Questões recebidas da API:', questoes);
            
            if (!questoes || questoes.length === 0) {
                console.warn('Nenhuma questão encontrada para este assunto');
                filteredQuestions = getQuestoesExemplo();
                alert("⚠️ Nenhuma questão encontrada. Usando questões de exemplo.");
            } else {
                filteredQuestions = shuffleArray(questoes);
            }
            
            console.log('Total de questões carregadas:', filteredQuestions.length);
            
            filteredQuestions.forEach((_, i) => {
                respostasSelecionadas[i] = null;
                respostaSelecionadaLista[i] = null;
            });
            
            renderizarModoLista();
            
        } catch (error) {
            console.error('Erro ao carregar questões do banco:', error);
            filteredQuestions = getQuestoesExemplo();
            renderizarModoLista();
            if (error.name !== 'AbortError') {
                alert("⚠️ Erro de conexão com o servidor. Usando questões de exemplo.");
            }
        }
    }
    
    function getQuestoesExemplo() {
        return [
            {
                id: 1,
                pergunta: "Considerando as normas ortográficas vigentes da Língua Portuguesa, assinale a alternativa em que todas as palavras estão grafadas corretamente:",
                a: "exceção – privilégio – discrição – ascensão",
                b: "privilégio – discrição – conciente – exceção",
                c: "desinteressado – privilégio – excessão – repercussão",
                d: "repercussão – ascensão – conciente – desinteressado",
                correta: "a",
                materia: "Português",
                assunto: "Ortografia",
                dica: "Lembre-se que 'exceção' vem do verbo 'excepcionar' e 'ascensão' vem de 'ascender'.",
                imagem_url: ""
            },
            {
                id: 2,
                pergunta: "Qual é a capital do Brasil?",
                a: "Rio de Janeiro",
                b: "São Paulo",
                c: "Brasília",
                d: "Belo Horizonte",
                correta: "c",
                materia: "Geografia",
                assunto: "Capitais Brasileiras",
                dica: "Foi planejada por Lúcio Costa e Oscar Niemeyer.",
                imagem_url: ""
            }
        ];
    }
    
    function shuffleArray(array) {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }
    
    function startTimer() {
        clearInterval(timerInterval);
        seconds = 0;
        updateTimerDisplay();
        updateTimerDisplayFlutuante();
        timerRunning = true;
        timerInterval = setInterval(() => {
            if (timerRunning) {
                seconds++;
                updateTimerDisplay();
                updateTimerDisplayLista();
                updateTimerDisplayFlutuante();
            }
        }, 1000);
    }
    
    function updateTimerDisplay() {
        const minutes = Math.floor(seconds / 60);
        const remainingSeconds = seconds % 60;
        document.getElementById('timer').textContent = 
            `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
    }
    
    function updateTimerDisplayLista() {
        const minutes = Math.floor(seconds / 60);
        const remainingSeconds = seconds % 60;
        const timerLista = document.getElementById('timerLista');
        if (timerLista) {
            timerLista.textContent = `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }
    }
    
    function alternarModo() {
        console.log('Alternando modo de', modoAtual, 'para', modoAtual === 'quiz' ? 'lista' : 'quiz');
        
        modoAtual = modoAtual === 'quiz' ? 'lista' : 'quiz';
        
        const textoModo = modoAtual === 'quiz' ? 'Modo Lista' : 'Modo Quiz';
        const iconeModo = modoAtual === 'quiz' ? 'fa-list' : 'fa-gamepad';
        
        document.querySelectorAll('.btn-trocar').forEach(btn => {
            btn.innerHTML = `
                <i class="fas ${iconeModo} text-sm"></i>
                <span class="hidden sm:inline text-sm">${textoModo}</span>
            `;
        });
        
        const btnTrocarFlutuante = document.querySelector('.btn-trocar-flutuante');
        if (btnTrocarFlutuante) {
            const textoFlutuante = modoAtual === 'quiz' ? 'Lista' : 'Quiz';
            const iconeFlutuante = modoAtual === 'quiz' ? 'fa-list' : 'fa-gamepad';
            btnTrocarFlutuante.innerHTML = `
                <i class="fas ${iconeFlutuante} text-xs"></i>
                <span class="hidden sm:inline text-xs">${textoFlutuante}</span>
            `;
            btnTrocarFlutuante.title = `Mudar para Modo ${textoFlutuante}`;
        }
        
        const modoQuiz = document.getElementById('modoQuiz');
        const modoLista = document.getElementById('modoLista');
        
        if (modoAtual === 'lista') {
            modoQuiz.classList.add('hidden');
            modoLista.classList.remove('hidden');
            timerRunning = true;
            updateTimerDisplayLista();
            updateTimerDisplayFlutuante();
            renderizarModoLista();
            const headerFlutuante = document.getElementById('headerFlutuante');
            if (headerFlutuante) {
                headerFlutuante.classList.remove('visivel');
            }
        } else {
            modoQuiz.classList.remove('hidden');
            modoLista.classList.add('hidden');
            timerRunning = true;
            mostrarQuestao();
        }
        
        console.log('Modo atual:', modoAtual);
    }
    
    function mostrarQuestao() {
        respostaConfirmada = false;
        opcaoSelecionada = null;
        timerRunning = true;
        
        if (!filteredQuestions || filteredQuestions.length === 0) {
            document.getElementById('enunciadoQuiz').innerText = 'Nenhuma questão disponível.';
            document.getElementById('questaoAtual').innerText = '0';
            return;
        }
        
        const q = filteredQuestions[currentIndex];
        console.log('Mostrando questão:', q);
        
        document.getElementById('enunciadoQuiz').innerText = q.pergunta || 'Pergunta não disponível';
        document.getElementById('questaoAtual').innerText = currentIndex + 1;
        
        // MOSTRAR IMAGEM SE HOUVER - CORRIGIDO
        mostrarImagem(q);
        
        const jaRespondida = respostasSelecionadas[currentIndex] !== null;
        
        const feedbackDiv = document.getElementById('emojiFeedback');
        if (jaRespondida) {
            const respostaCorreta = q.correta ? q.correta.toUpperCase() : "A";
            const respostaSelecionada = respostasSelecionadas[currentIndex];
            const acertou = (respostaSelecionada && respostaSelecionada.toUpperCase() === respostaCorreta);
            
            feedbackDiv.innerHTML = acertou ? 
                '<div class="text-6xl animate-bounce">✅</div>' : 
                '<div class="text-6xl animate-pulse">❌</div>';
        } else {
            feedbackDiv.innerHTML = '<i class="fas fa-lightbulb text-yellow-500 text-5xl cursor-pointer hover:text-yellow-600 transition-all duration-300 hover:scale-110" onclick="mostrarDica()" title="Clique para ver a dica"></i>';
        }
        feedbackDiv.className = 'feedback-emoji-quiz';
        
        const responderBtn = document.getElementById('responderBtn');
        if (jaRespondida) {
            responderBtn.disabled = true;
            const respostaCorreta = q.correta ? q.correta.toUpperCase() : "A";
            const respostaSelecionada = respostasSelecionadas[currentIndex];
            const acertou = (respostaSelecionada && respostaSelecionada.toUpperCase() === respostaCorreta);
            responderBtn.innerText = acertou ? "✅ JÁ RESPONDIDA - CORRETO!" : "❌ JÁ RESPONDIDA";
            responderBtn.style.background = acertou 
                ? "linear-gradient(135deg, #4CAF50, #66BB6A)" 
                : "linear-gradient(135deg, #F44336, #E91E63)";
        } else {
            responderBtn.disabled = true;
            responderBtn.innerText = "RESPONDER";
            responderBtn.style.background = "linear-gradient(135deg, #4CAF50, #66BB6A)";
        }
        
        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';
        
        if (!q.a || !q.b || !q.c || !q.d) {
            container.innerHTML = '<p class="text-red-500 text-center p-4 text-lg">Erro: Questão incompleta</p>';
            return;
        }
        
        const respostaCorreta = q.correta ? q.correta.toUpperCase() : "A";
        const respostaSelecionada = respostasSelecionadas[currentIndex];
        
        [['A', q.a], ['B', q.b], ['C', q.c], ['D', q.d]].forEach(([letra, texto]) => {
            const div = document.createElement('div');
            div.className = "option-item";
            
            if (jaRespondida) {
                if (letra === respostaCorreta) {
                    div.classList.add('respondida-correta');
                } else if (respostaSelecionada && letra === respostaSelecionada.toUpperCase()) {
                    div.classList.add('respondida-incorreta');
                }
                div.style.pointerEvents = 'none';
            }
            
            div.innerHTML = `
                <div class="option-checkbox"></div>
                <div class="option-text">${texto}</div>
            `;
            div.dataset.opcaoId = letra;
            
            if (!jaRespondida) {
                div.onclick = () => selecionarOpcao(letra, div);
            }
            
            container.appendChild(div);
        });
        
        atualizarBotoesNavegacao();
    }
    
    // FUNÇÃO CORRIGIDA PARA MOSTRAR IMAGEM
    function mostrarImagem(questao) {
        const imagemContainer = document.getElementById('imagemContainer');
        const imagemEl = document.getElementById('questaoImagem');
        
        let imagemPath = questao.imagem_url || questao.imagem_path || '';
        
        if (imagemPath && imagemPath.trim() !== '') {
            let imagemUrl;
            if (imagemPath.startsWith('http')) {
                imagemUrl = imagemPath;
            } else if (imagemPath.startsWith('/')) {
                // ✅ Usar caminho relativo (não precisa de BASE_URL)
                imagemUrl = imagemPath;
            } else {
                // ✅ Caminho relativo para imagens
                imagemUrl = '/midia/imagens/' + imagemPath;
            }
            
            console.log('Carregando imagem:', imagemUrl);
            imagemEl.src = imagemUrl;
            imagemContainer.classList.remove('hidden');
            
            imagemEl.onerror = function() {
                console.warn('Erro ao carregar imagem:', imagemUrl);
                imagemContainer.classList.add('hidden');
            };
            
            imagemEl.onload = function() {
                console.log('Imagem carregada com sucesso');
            };
        } else {
            imagemContainer.classList.add('hidden');
        }
    }
    
    function atualizarBotoesNavegacao() {
        const btnAnterior = document.getElementById('btnAnterior');
        const btnProxima = document.getElementById('btnProxima');
        
        btnAnterior.disabled = currentIndex === 0;
        btnProxima.disabled = currentIndex === filteredQuestions.length - 1;
    }
    
    function questaoAnterior() {
        if (currentIndex > 0) {
            currentIndex--;
            mostrarQuestao();
        }
    }
    
    function proximaQuestao() {
        if (currentIndex < filteredQuestions.length - 1) {
            currentIndex++;
            mostrarQuestao();
        }
    }
    
    function selecionarOpcao(opcaoId, element) {
        if (respostaConfirmada) return;
        
        document.querySelectorAll('.option-item').forEach(opt => {
            opt.classList.remove('selected');
        });
        
        element.classList.add('selected');
        opcaoSelecionada = opcaoId;
        document.getElementById('responderBtn').disabled = false;
    }
    
    function tocarSom(tipo) {
        try {
            const filename = tipo === 'acerto' ? 'acerto.mp3' : 'erro.mp3';
            const somUrl = '../sounds/' + filename;
            
            console.log(`🎵 PANDA: Tentando tocar som ${tipo} de: ${somUrl}`);
            
            const audio = new Audio(somUrl);
            audio.volume = 0.9;
            
            const playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    console.log(`✅ PANDA: Som ${tipo} tocado com sucesso!`);
                }).catch(error => {
                    console.log(`⚠️ PANDA: Navegador bloqueou o som automaticamente`);
                    
                    document.addEventListener('click', function tentarSomNovamente() {
                        audio.play().then(() => {
                            console.log(`✅ PANDA: Som ${tipo} tocado após clique!`);
                        }).catch(e => {
                            console.log(`❌ PANDA: Erro definitivo: ${e.message}`);
                        });
                        document.removeEventListener('click', tentarSomNovamente);
                    }, { once: true });
                });
            }
                    
        } catch (e) {
            console.log(`❌ PANDA: ERRO GRAVE no sistema de som:`, e);
        }
    }
    
    function confirmarResposta() {
        if (!opcaoSelecionada || respostaConfirmada) return;
        
        const q = filteredQuestions[currentIndex];
        respostaConfirmada = true;
        timerRunning = false;
        
        const respostaCorreta = q.correta ? q.correta.toUpperCase() : "A";
        const respostaSelecionada = opcaoSelecionada.toUpperCase();
        const acertou = (respostaSelecionada === respostaCorreta);
        
        console.log('Comparação:', {
            selecionada: respostaSelecionada,
            correta: respostaCorreta,
            acertou: acertou
        });
        
        setTimeout(() => {
            tocarSom(acertou ? 'acerto' : 'erro');
        }, 10);
        
        document.querySelectorAll('.option-item').forEach(opt => {
            opt.style.pointerEvents = 'none';
            const optId = opt.dataset.opcaoId;
            
            if (optId === respostaCorreta) {
                opt.style.background = "#E8F5E9";
                opt.style.borderColor = "#4CAF50";
                opt.querySelector('.option-checkbox').style.background = "#4CAF50";
                opt.querySelector('.option-checkbox').style.borderColor = "#4CAF50";
                opt.querySelector('.option-checkbox').innerHTML = '✓';
            } else if (optId === respostaSelecionada && !acertou) {
                opt.style.background = "#FFEBEE";
                opt.style.borderColor = "#F44336";
                opt.querySelector('.option-checkbox').style.background = "#F44336";
                opt.querySelector('.option-checkbox').style.borderColor = "#F44336";
                opt.querySelector('.option-checkbox').innerHTML = '✗';
            }
        });
        
        const responderBtn = document.getElementById('responderBtn');
        responderBtn.disabled = true;
        responderBtn.innerText = acertou ? "✅ CORRETO!" : "❌";
        responderBtn.style.background = acertou 
            ? "linear-gradient(135deg, #4CAF50, #66BB6A)" 
            : "linear-gradient(135deg, #F44336, #E91E63)";
        
        const feedbackDiv = document.getElementById('emojiFeedback');
        feedbackDiv.innerHTML = acertou ? 
            '<div class="text-6xl animate-bounce">✅</div>' : 
            '<div class="text-6xl animate-pulse">❌</div>';
        feedbackDiv.className = 'feedback-emoji-quiz';
        
        salvarResultado(q.materia, q.assunto, acertou);
        respostasSelecionadas[currentIndex] = opcaoSelecionada;
        respostaSelecionadaLista[currentIndex] = opcaoSelecionada;
        
        setTimeout(() => {
            if (currentIndex < filteredQuestions.length - 1) {
                currentIndex++;
                mostrarQuestao();
            } else {
                finishQuiz();
            }
        }, 2000);
    }
    
    function renderizarModoLista() {
        const container = document.getElementById('listaQuestoes');
        if (!filteredQuestions || filteredQuestions.length === 0) {
            container.innerHTML = `
                <div class="sem-questoes">
                    <div class="sem-questoes-emoji">😿</div>
                    <h3 class="text-xl font-bold text-blue-800 mb-3">Nenhuma questão encontrada</h3>
                    <p class="text-blue-600 mb-4">Não há questões disponíveis para esta matéria e assunto.</p>
                    <button onclick="window.history.back()" class="bg-pink-500 text-white px-6 py-3 rounded-full font-bold hover:bg-pink-600 transition">
                        ← Voltar para Assuntos
                    </button>
                </div>
            `;
            return;
        }
        
        let html = '';
        
        filteredQuestions.forEach((q, index) => {
            const respostaSelecionada = respostasSelecionadas[index];
            const respostaCorreta = q.correta ? q.correta.toUpperCase() : "A";
            const jaRespondida = !!respostaSelecionada;
            const acertou = jaRespondida ? (respostaSelecionada.toUpperCase() === respostaCorreta) : false;
            
            const opcoesClasses = {
                'A': 'opcao-item-lista',
                'B': 'opcao-item-lista',
                'C': 'opcao-item-lista',
                'D': 'opcao-item-lista'
            };
            
            if (jaRespondida) {
                ['A', 'B', 'C', 'D'].forEach(letra => {
                    if (letra === respostaCorreta) {
                        opcoesClasses[letra] += ' correta';
                    } else if (letra === respostaSelecionada.toUpperCase()) {
                        opcoesClasses[letra] += ' incorreta';
                    }
                });
            }
            
            // Verificar se tem imagem
            const temImagem = q.imagem_url || q.imagem_path;
            
            html += `
                <div class="questao-card-lista" id="questao-lista-${index}">
                    <div class="questao-header-lista">
                        <div class="numero-questao-lista">${index + 1}</div>
                        
                        <i class="fas fa-lightbulb lampada-dica-lista" onclick="mostrarDicaLista(${index})" title="Clique para ver a dica"></i>
                        
                        <div class="questao-tags">
                            <span class="tag-materia">${q.materia || 'Matéria'}</span>
                            <span class="tag-assunto">${q.assunto || 'Assunto'}</span>
                            ${temImagem ? '<span class="ml-2 text-blue-500"><i class="fas fa-image"></i></span>' : ''}
                        </div>
                    </div>
                    
                    <h3 class="enunciado-lista">${q.pergunta || 'Pergunta não disponível'}</h3>
                    
                    <!-- Imagem no modo lista (se houver) -->
                    ${temImagem ? `
                        <div class="flex justify-center my-3">
                            <img src="${montarUrlImagem(q)}" class="max-w-full max-h-40 rounded-lg border-2 border-pink-200" onerror="this.style.display='none'">
                        </div>
                    ` : ''}
                    
                    <div class="opcoes-container-lista">
                        ${['A', 'B', 'C', 'D'].map(letra => {
                            const texto = q[letra.toLowerCase()] || `Opção ${letra}`;
                            const isSelected = respostaSelecionadaLista[index] === letra;
                            const classeExtra = isSelected ? ' selecionada' : '';
                            
                            return `
                                <div class="${opcoesClasses[letra]}${classeExtra}" 
                                     onclick="${!jaRespondida ? `selecionarOpcaoLista(${index}, '${letra}')` : ''}"
                                     ${jaRespondida ? 'style="pointer-events: none;"' : ''}>
                                    <div class="letra-opcao-lista">${letra}</div>
                                    <div class="texto-opcao-lista">${texto}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    
                    ${!jaRespondida ? `
                        <button class="btn-responder-lista" onclick="confirmarRespostalista(${index})" ${respostaSelecionadaLista[index] ? '' : 'disabled'}>
                            RESPONDER ESTA QUESTÃO
                        </button>
                    ` : ''}
                    
                    <!-- Status da questão com cores corretas -->
                    <div class="status-questao ${jaRespondida ? (acertou ? 'status-acertou' : 'status-errou') : 'status-nao-respondida'}">
                        ${jaRespondida ? 
                            (acertou ? '✅ Respondida corretamente' : '❌ Resposta incorreta') : 
                            'Escolha uma opção acima'}
                    </div>
                    
                    ${jaRespondida && !acertou ? `
                        <div class="feedback-erro">
                            <div class="flex items-center gap-2 text-yellow-800 font-bold mb-1">
                                <i class="fas fa-star"></i>
                                <span>Resposta correta: ${respostaCorreta}</span>
                            </div>
                            ${q.dica ? `
                                <div class="flex items-start gap-2 mt-1">
                                    <i class="fas fa-lightbulb text-yellow-600 mt-0.5"></i>
                                    <p class="text-yellow-700 text-sm">${q.dica}</p>
                                </div>
                            ` : ''}
                        </div>
                    ` : ''}
                </div>
            `;
        });
        
        container.innerHTML = html;
        
        updateTimerDisplayLista();
        updateTimerDisplayFlutuante();
    }
    
    // Função auxiliar para montar URL da imagem
    function montarUrlImagem(questao) {
        let imagemPath = questao.imagem_url || questao.imagem_path || '';
        if (!imagemPath) return '';
        
        if (imagemPath.startsWith('http')) {
            return imagemPath;
        } else if (imagemPath.startsWith('/')) {
            return imagemPath;  // ✅ Já é caminho absoluto
        } else {
            return '/midia/imagens/' + imagemPath;  // ✅ Caminho relativo
        }
    }
    
    function selecionarOpcaoLista(questaoIndex, letra) {
        if (respostasSelecionadas[questaoIndex]) return;
        
        respostaSelecionadaLista[questaoIndex] = letra;
        renderizarModoLista();
    }
    
    function confirmarRespostalista(questaoIndex) {
        const letra = respostaSelecionadaLista[questaoIndex];
        if (!letra || respostasSelecionadas[questaoIndex]) return;
        
        const q = filteredQuestions[questaoIndex];
        respostasSelecionadas[questaoIndex] = letra;
        const respostaCorreta = q.correta ? q.correta.toUpperCase() : "A";
        const acertou = (letra === respostaCorreta);
        
        setTimeout(() => {
            tocarSom(acertou ? 'acerto' : 'erro');
        }, 10);
        
        salvarResultado(q.materia, q.assunto, acertou);
        renderizarModoLista();
        
        const questaoElement = document.getElementById(`questao-lista-${questaoIndex}`);
        if (questaoElement) {
            questaoElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }
    
    function mostrarDicaLista(questaoIndex) {
        const q = filteredQuestions[questaoIndex];
        const dica = q.dica || "";
        
        if (!dica) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'fixed top-20 right-4 bg-gradient-to-r from-pink-50 to-purple-50 border-3 border-pink-300 rounded-2xl p-4 shadow-lg z-50';
            alertDiv.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="text-2xl">😅</div>
                    <div>
                        <p class="font-bold text-pink-700">Esta questão não tem dica</p>
                        <p class="text-sm text-pink-600">Continue pensando, você consegue!</p>
                    </div>
                </div>
            `;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
            return;
        }
        
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
        modal.innerHTML = `
            <div class="bg-gradient-to-br from-yellow-50 to-orange-50 rounded-3xl p-6 max-w-md w-full shadow-2xl border-4 border-yellow-300 relative">
                <div class="absolute -top-4 left-1/2 transform -translate-x-1/2">
                    <div class="bg-yellow-500 text-white p-3 rounded-full text-2xl shadow-lg">💡</div>
                </div>

                <button onclick="this.parentElement.parentElement.remove()" class="absolute top-3 right-3 text-gray-500 hover:text-gray-700 text-2xl">
                    &times;
                </button>

                <h3 class="text-center text-xl font-black text-yellow-800 mt-6 mb-4">Dica da Questão ${questaoIndex + 1}</h3>

                <div class="bg-white/80 rounded-2xl p-5 mb-5 border-2 border-yellow-200">
                    <p class="text-gray-800 text-lg leading-relaxed">${dica}</p>
                </div>

                <div class="text-center">
                    <p class="text-sm text-yellow-700 font-bold mb-2">✨ Continue pensando! Você consegue! ✨</p>
                    <button onclick="this.parentElement.parentElement.parentElement.remove()" 
                            class="bg-gradient-to-r from-yellow-500 to-orange-500 text-white font-bold py-3 px-8 rounded-full hover:from-yellow-600 hover:to-orange-600 transition shadow-lg">
                        Entendi, vamos continuar! 👍
                    </button>
                </div>
            </div>
        `;
        
        document.body.appendChild(modal);
    }
    
    function salvarResultado(materia, assunto, acertou) {
        try {
            const usuarioId = localStorage.getItem('usuario_id');
            const usuarioNome = localStorage.getItem('usuario_nome');

            if (!usuarioId) {
                console.warn('Usuário não logado, estatística não enviada ao backend.');
                return;
            }

            let historico = JSON.parse(localStorage.getItem('panda_estatisticas')) || [];
            historico.push({
                data: new Date().toISOString(),
                usuario_id: usuarioId,
                materia: materia,
                assunto: assunto,
                acerto: acertou ? 1 : 0,
                erro: acertou ? 0 : 1,
                tempo: seconds
            });
            localStorage.setItem('panda_estatisticas', JSON.stringify(historico));

            fetch('/api/estatisticas', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    usuario_id: Number(usuarioId),
                    nome: usuarioNome || '',
                    materia: materia || 'Não especificada',
                    assunto: assunto || 'Não especificado',
                    acertou: Boolean(acertou),
                    tempo: Number(seconds),
                    data: new Date().toISOString()
                })
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }
                return res.json();
            })
            .then(data => {
                console.log('✅ Estatística salva no banco:', data);
            })
            .catch(err => {
                console.error('❌ Erro ao salvar estatística no backend:', err.message);
            });

            atualizarProgressoPerfil(materia, acertou);

        } catch (e) {
            console.error('Erro geral ao salvar estatística:', e);
        }
    }
    
    function atualizarProgressoPerfil(materia, acertou) {
        try {
            const profileData = localStorage.getItem('currentProfileData');
            if (profileData) {
                const profile = JSON.parse(profileData);
                const materiaKey = materia.toLowerCase().replace(/[^a-z]/g, '');
                
                if (!profile.progress) profile.progress = {};
                if (!profile.stats) profile.stats = { pontos: 0, acertos: 0, erros: 0 };
                
                if (!profile.progress[materiaKey]) profile.progress[materiaKey] = 0;
                profile.progress[materiaKey] = Math.min(100, profile.progress[materiaKey] + (acertou ? 5 : 1));
                
                profile.stats.pontos += acertou ? 10 : 0;
                profile.stats.acertos += acertou ? 1 : 0;
                profile.stats.erros += acertou ? 0 : 1;
                
                localStorage.setItem('currentProfileData', JSON.stringify(profile));
            }
        } catch (e) {
            console.error('Erro ao atualizar perfil:', e);
        }
    }
    
    function finishQuiz() {
        clearInterval(timerInterval);
        setTimeout(() => {
            window.location.href = 'assuntos.html';
        }, 500);
    }
    
    function mostrarDica() {
        if (!filteredQuestions?.length || currentIndex >= filteredQuestions.length) return;

        const q = filteredQuestions[currentIndex];
        const dica = q.dica || "";

        if (!dica) {
            alert("Esta questão não tem dica disponível. 😅");
            return;
        }

        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
        modal.innerHTML = `
            <div class="bg-gradient-to-br from-yellow-50 to-orange-50 rounded-3xl p-6 max-w-md w-full shadow-2xl border-4 border-yellow-300 relative">
                <div class="absolute -top-4 left-1/2 transform -translate-x-1/2">
                    <div class="bg-yellow-500 text-white p-3 rounded-full text-2xl shadow-lg">💡</div>
                </div>

                <button onclick="this.parentElement.parentElement.remove()" class="absolute top-3 right-3 text-gray-500 hover:text-gray-700 text-2xl">
                    &times;
                </button>

                <h3 class="text-center text-xl font-black text-yellow-800 mt-6 mb-4">Dica da Questão</h3>

                <div class="bg-white/80 rounded-2xl p-5 mb-5 border-2 border-yellow-200">
                    <p class="text-gray-800 text-lg leading-relaxed">${dica}</p>
                </div>

                <div class="text-center">
                    <p class="text-sm text-yellow-700 font-bold mb-2">✨ Continue pensando! Você consegue! ✨</p>
                    <button onclick="this.parentElement.parentElement.parentElement.remove()" 
                            class="bg-gradient-to-r from-yellow-500 to-orange-500 text-white font-bold py-3 px-8 rounded-full hover:from-yellow-600 hover:to-orange-600 transition shadow-lg">
                        Entendi, vamos continuar! 👍
                    </button>
                </div>
            </div>
        `;

        document.body.appendChild(modal);
    }

    setTimeout(function testarSons() {

        fetch('../sounds/acerto.mp3', { method: 'HEAD' })

                    console.log(`❌ erro.mp3 NÃO encontrado (status: ${response.status})`);
                }
            })
            .catch(error => {
                console.log("❌ ERRO ao buscar erro.mp3:", error.message);

    // Função para voltar ao topo
    function voltarAoTopo() {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    }

    // Mostrar/esconder botão baseado no scroll
    window.addEventListener('scroll', function() {
        const btnTopo = document.getElementById('btnTopo');
        const modoLista = document.getElementById('modoLista');
        
        // Só mostrar no modo lista
        if (!modoLista || modoLista.classList.contains('hidden')) {
            btnTopo.classList.remove('visible');
            return;
        }
        
        if (window.scrollY > 300) {
            btnTopo.classList.add('visible');
        } else {
            btnTopo.classList.remove('visible');
        }
    });

    </script>
